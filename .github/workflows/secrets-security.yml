
name: Secrets Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets-security:
    name: Secrets Security Checks
    runs-on: ubuntu-latest

    env:
      APP_NAME: phase-3-secrets-management-lab
      ENVIRONMENT: ci
      AWS_REGION: us-east-1
      AWS_SECRET_NAME: ${{ secrets.AWS_SECRET_NAME }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff linting
        run: ruff check .

      - name: Run Pytest
        run: python -m pytest -v

      - name: Validate GitHub Actions secret handling
        run: |
          if [ -n "$AWS_SECRET_NAME" ]; then
            echo "AWS_SECRET_NAME is configured in GitHub Actions Secrets."
          else
            echo "AWS_SECRET_NAME is not configured. This is acceptable for demo-only CI."
          fi
          echo "Secret values are intentionally not printed."

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}